# TheBridge TURN/STUN Server Configuration
# coturn configuration for internal corporate networks

listening-port=3478
tls-listening-port=5349

# Relay ports range
min-port=49152
max-port=49200

# Authentication
use-auth-secret
static-auth-secret=turnsecret

# Realm
realm=thebridge.local

# Logging
log-file=stdout
verbose

# Performance
total-quota=100
bps-capacity=0
stale-nonce=600

# Security
no-multicast-peers
no-cli

# Fingerprint for message authentication
fingerprint
lt-cred-mech

# For internal network usage
no-tlsv1
no-tlsv1_1

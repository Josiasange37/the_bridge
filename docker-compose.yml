version: '3.8'

services:
  # ========== TheBridge API Server ==========
  thebridge-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: thebridge-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - SERVER_HOST=0.0.0.0
      - API_PORT=3000
      - POSTGRES_HOST=thebridge-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=thebridge
      - POSTGRES_USER=thebridge
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-thebridgesecret}
      - REDIS_HOST=thebridge-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redissecret}
      - MINIO_ENDPOINT=thebridge-minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-thebridge}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-miniosecret}
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_change_me}
      - TURN_SECRET=${TURN_SECRET:-turnsecret}
      - TURN_SERVER=turn:thebridge-turn:3478
      - STUN_SERVER=stun:thebridge-turn:3478
    depends_on:
      thebridge-postgres:
        condition: service_healthy
      thebridge-redis:
        condition: service_healthy
    networks:
      - thebridge-net
    volumes:
      - server-logs:/app/logs

  # ========== PostgreSQL Database ==========
  thebridge-postgres:
    image: postgres:16-alpine
    container_name: thebridge-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=thebridge
      - POSTGRES_USER=thebridge
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-thebridgesecret}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thebridge"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - thebridge-net

  # ========== Redis Cache ==========
  thebridge-redis:
    image: redis:7-alpine
    container_name: thebridge-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redissecret} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redissecret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - thebridge-net

  # ========== MinIO File Storage ==========
  thebridge-minio:
    image: minio/minio:latest
    container_name: thebridge-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-thebridge}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-miniosecret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - thebridge-net

  # ========== TURN/STUN Server (coturn) ==========
  thebridge-turn:
    image: coturn/coturn:latest
    container_name: thebridge-turn
    restart: unless-stopped
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/udp"
      - "5349:5349/tcp"
      - "49152-49200:49152-49200/udp"
    volumes:
      - ./server/docker/turnserver.conf:/etc/coturn/turnserver.conf:ro
    networks:
      - thebridge-net

volumes:
  postgres-data:
  redis-data:
  minio-data:
  server-logs:

networks:
  thebridge-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
